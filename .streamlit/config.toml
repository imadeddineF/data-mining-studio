[theme]
base = "dark"
primaryColor = "#7C7CFF"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#161B26"
textColor = "#E6E8EB"

[server]
headless = true
runOnSave = false
maxUploadSize = 500
enableXsrfProtection = false

[browser]
gatherUsageStats = false
serverAddress = "0.0.0.0"

[client]
toolbarMode = "minimal"
showErrorDetails = false

[logger]
level = "error"

[telemetry]
enabled = false
